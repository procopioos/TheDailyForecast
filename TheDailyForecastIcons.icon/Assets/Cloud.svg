<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" width="100%" height="100%">
  <defs>
    <!-- Soft ambient floor shadow -->
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#1e293b" flood-opacity="0.12" />
    </filter>

    <!-- 3D Spherical Gradients for exact puff positioning -->
    <radialGradient id="back-top" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#d0dfed" />
    </radialGradient>

    <radialGradient id="mid-left" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#f3f8fe" />
      <stop offset="100%" stop-color="#d6e4f0" />
    </radialGradient>

    <radialGradient id="far-left" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="75%" stop-color="#f1f7fc" />
      <stop offset="100%" stop-color="#d4e3f1" />
    </radialGradient>

    <radialGradient id="front-center" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="65%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#d9e6f2" />
    </radialGradient>

    <radialGradient id="far-right" cx="40%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#edf4fc" />
      <stop offset="100%" stop-color="#cfe0f0" />
    </radialGradient>
  </defs>

  <!-- Main Cloud Structure -->
  <g filter="url(#soft-blur)">
    <!-- 1. Large Top Back Puff -->
    <circle cx="130" cy="52" r="34" fill="url(#back-top)" />

    <!-- 2. Mid-Left Higher Puff -->
    <circle cx="92" cy="56" r="22" fill="url(#mid-left)" />

    <!-- 3. Far Left Base Puff -->
    <circle cx="72" cy="74" r="24" fill="url(#far-left)" />

    <!-- 4. Far Right Base Puff -->
    <circle cx="160" cy="76" r="24" fill="url(#far-right)" />

    <!-- 5. Front Center Main Puff (Ties the silhouette together) -->
    <circle cx="116" cy="78" r="35" fill="url(#front-center)" />
  </g>
</svg>
